<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .main{
        display: grid;
        grid-template-columns: 200px 200px;
       gap: 10px;
    

    }
    .box{
        height: 50px;
        width: 100px;
        background-color: blue;
        margin-right: 20%;
        align-items: center;
         

    }
</style>
<body>
    <div class="main">
        
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
        
    </div>
    
</body>
</html>
